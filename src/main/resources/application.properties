spring.profiles.active=${SPRING_PROFILES_ACTIVE}

spring.application.name=bffwebapp

server.port=${PORT}

security.jwt.issuer=easycv-bff-web-app
security.jwt.access.key=${JWT_ACCESS_KEY}
security.jwt.refresh.key=${JWT_REFRESH_KEY}
security.jwt.access-expiration-seconds=900
security.jwt.refresh-expiration-minutes=28800

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/bff-web-app/docs

springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/api/bff-web-app/docs/swagger-ui.html
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=false
springdoc.swagger-ui.syntaxHighlight.activated=true

commons.log-endpoint.enabled=true

user-api.endpoint.baseurl=http://localhost:8081/api/users
user-api.endpoint.patch=/{userId}
user-api.endpoint.get-user-light-by-credential=/auth/login
user-api.endpoint.get-user-light-by-id=/{userId}/refresh
user-api.endpoint.reset-password=/auth/reset

allowed-cors-origin=http://localhost:4200